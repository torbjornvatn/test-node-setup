name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      
      - name: Update npm to latest
        run: |
          $NVM_DIR/nvm.sh install-latest-npm
      
      - name: Print version
        run: npm version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
