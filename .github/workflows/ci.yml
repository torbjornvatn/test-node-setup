name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show pre-installed Node.js version
        run: node --version
        
      - uses: actions/checkout@v6
      
      - name: Install Node.js via nvm
        shell: bash --login {0}
        run: |
          nvm install --no-progress --latest-npm
          echo "$(dirname $(nvm which node))" >> $GITHUB_PATH
          
      - name: Show newly installed Node.js version
        run: node --version

      # Optional: Cache npm dependencies
      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
        
      - name: Store npm cache
        uses: actions/cache@v6
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
